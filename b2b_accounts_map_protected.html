<style>
  * { box-sizing: border-box; }

  body { display:flex; align-items:center; justify-content:center; }
  .card { background:#1e293b; padding:32px 36px; border-radius:12px; border:1px solid #334155; max-width:420px; width:90%; box-shadow:0 12px 40px rgba(0,0,0,0.5); }

  label { display:block; font-size:12px; color:#94a3b8; margin-bottom:6px; text-transform:uppercase; letter-spacing:0.05em; }
  input[type=password] { width:100%; padding:11px 14px; background:#0f172a; border:1px solid #334155; border-radius:6px; color:#e2e8f0; font-size:15px; outline:none; font-family:inherit; }
  input[type=password]:focus { border-color:#3b82f6; }
  button { width:100%; margin-top:14px; padding:11px 14px; background:#3b82f6; color:#fff; border:none; border-radius:6px; font-size:15px; font-weight:500; cursor:pointer; transition:background 0.15s; font-family:inherit; }
  button:hover:not(:disabled) { background:#2563eb; }
  button:disabled { background:#475569; cursor:wait; }
  .err { margin-top:12px; padding:10px 12px; background:#7f1d1d33; border:1px solid #7f1d1d; color:#fca5a5; border-radius:6px; font-size:13px; display:none; }
  .err.show { display:block; }
  .footer { margin-top:18px; font-size:11px; color:#64748b; text-align:center; line-height:1.5; }
</style>

function b64ToBytes(b64) {
  const bin = atob(b64);
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}

async function deriveKey(password, salt, iterations) {
  const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name:'PBKDF2', salt, iterations, hash:'SHA-256' },
    km,
    { name:'AES-GCM', length:256 },
    false,
    ['decrypt']
  );
}

async function decrypt(password) {
  const salt = b64ToBytes(PAYLOAD.salt);
  const iv = b64ToBytes(PAYLOAD.iv);
  const ct = b64ToBytes(PAYLOAD.ct);
  const key = await deriveKey(password, salt, PAYLOAD.iter);
  const pt = await crypto.subtle.decrypt({ name:'AES-GCM', iv }, key, ct);
  return new TextDecoder().decode(pt);
}

const form = document.getElementById('form');
const pw = document.getElementById('pw');
const err = document.getElementById('err');
const btn = document.getElementById('btn');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  err.classList.remove('show');
  btn.disabled = true;
  btn.textContent = 'Decrypting…';
  try {
    const html = await decrypt(pw.value);
    // Replace the entire document with the decrypted HTML
    document.open();
    document.write(html);
    document.close();
  } catch (ex) {
    err.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Unlock map';
    pw.select();
  }
});
