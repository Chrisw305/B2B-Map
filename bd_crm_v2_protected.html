<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BD Pipeline CRM — Sign in</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
<style>
  html,body{margin:0;padding:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;background:linear-gradient(135deg,#0b1020 0%,#1a2347 100%);color:#e8ecff}
  .wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  .card{background:#111935;border:1px solid #2a3566;border-radius:12px;padding:32px;width:380px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.5)}
  .card h1{margin:0 0 6px;font-size:22px}
  .card p{margin:0 0 18px;color:#9aa6d4;font-size:13px}
  .card input{width:100%;padding:11px 14px;border-radius:8px;border:1px solid #2a3566;background:#0b1020;color:#e8ecff;font-size:15px;outline:none;box-sizing:border-box}
  .card input:focus{border-color:#22d3ee}
  .card button{width:100%;margin-top:12px;padding:11px;border-radius:8px;border:0;background:#22d3ee;color:#001;font-weight:700;font-size:15px;cursor:pointer}
  .card button:disabled{opacity:.6;cursor:wait}
  .err{color:#ef4444;font-size:12px;margin-top:8px;min-height:16px}
  .sub{color:#6b7280;font-size:11px;margin-top:14px}
</style>
</head>
<body>
<div class="wrap" id="login">
  <form class="card" onsubmit="event.preventDefault();unlock()">
    <h1>BD Pipeline CRM</h1>
    <p>This dashboard contains internal account data. Enter the team password to continue.</p>
    <input id="pw" type="password" autofocus placeholder="Password" />
    <button type="submit" id="btn">Unlock</button>
    <div class="err" id="err"></div>
    <div class="sub">Encrypted client-side · AES-256-GCM · No server</div>
  </form>
</div>

const ITER     = 250000;

function b64ToBytes(s){
  const bin = atob(s);
  const out = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) out[i]=bin.charCodeAt(i);
  return out;
}

async function unlock(){
  const pwInput = document.getElementById('pw');
  const btn = document.getElementById('btn');
  const errEl = document.getElementById('err');
  errEl.textContent = '';
  const pw = pwInput.value;
  if(!pw){ errEl.textContent='Enter a password.'; return; }
  btn.disabled = true; btn.textContent = 'Decrypting…';
  try {
    const enc = new TextEncoder();
    const baseKey = await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      { name:'PBKDF2', salt: b64ToBytes(SALT_B64), iterations: ITER, hash:'SHA-256' },
      baseKey,
      { name:'AES-GCM', length:256 },
      false,
      ['decrypt']
    );
    const ptBuf = await crypto.subtle.decrypt(
      { name:'AES-GCM', iv: b64ToBytes(IV_B64) },
      key,
      b64ToBytes(CT_B64)
    );
    // Decompress gzip
    const gz = new Uint8Array(ptBuf);
    const html = pako.ungzip(gz, { to:'string' });
    document.open();
    document.write(html);
    document.close();
  } catch(e){
    errEl.textContent = 'Wrong password (or corrupt file).';
    btn.disabled = false; btn.textContent = 'Unlock';
    pwInput.select();
  }
}
</script>
